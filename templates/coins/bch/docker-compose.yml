  bch:
    image: ghcr.io/mmfpsolutions/bitcoincash:latest
    container_name: bch
    network_mode: host
    stop_grace_period: 120s
    volumes:
      - /data/bch/data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"  
    restart: unless-stopped
