  dgb:
    image: ghcr.io/mmfpsolutions/digibyte:latest
    container_name: dgb
    network_mode: host
    stop_grace_period: 120s
    volumes:
      - /data/dgb/data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"  
    restart: unless-stopped
